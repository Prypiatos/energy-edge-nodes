version: "3.8"

services:

  # ── 1. MQTT Broker (Mosquitto) ─────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2   # download this pre-built image from Docker Hub
    container_name: mosquitto
    ports:
      - "1883:1883"       # MQTT — ESP32 connects here
      - "9001:9001"       # WebSocket — MQTT Explorer connects here
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped

  # ── 2. ZooKeeper (required by Kafka) ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  # ── 3. Kafka Broker ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"       # ML group / dashboard connects here
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   # topics auto-created on first message
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ── 4. Kafka Topic Setup (runs once, then exits) ───────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-setup
    depends_on:
      - kafka
    entrypoint: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        sleep 15 &&
        kafka-topics --create --if-not-exists --topic energy.telemetry --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --topic energy.health    --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --topic energy.events    --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
        echo 'Topics created successfully' &&
        kafka-topics --list --bootstrap-server kafka:9092
      "
    restart: "no"         # runs once and exits — that is correct

  # ── 5. MQTT → Kafka Bridge ─────────────────────────────────────────────────
  mqtt-kafka-bridge:
    build: ./mqtt-kafka-bridge   # builds from the Dockerfile in that folder
    container_name: mqtt-kafka-bridge
    depends_on:
      - mosquitto
      - kafka
    environment:
      MQTT_BROKER: mosquitto      # use container name — Docker resolves it
      MQTT_PORT: 1883
      KAFKA_BROKER: kafka:9092    # use container name — Docker resolves it
    restart: unless-stopped       # auto-restarts if it crashes

# ── Named volumes (data persists across restarts) ─────────────────────────────
volumes:
  mosquitto_data:
  mosquitto_logs:
  zookeeper_data:
  kafka_data: